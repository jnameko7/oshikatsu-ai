<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>目標シミュレーター｜推し活資金AI</title><link rel="stylesheet" href="style.css"><style>.page-wrap{padding:36px 16px 70px;background:linear-gradient(180deg,#fff,#fffafb)}.tool-box{width:min(960px,100%);margin:auto;background:#fff;border:1px solid #e9e8ef;border-radius:22px;box-shadow:0 18px 45px rgba(36,30,68,.10);padding:36px}.breadcrumb{color:#8b93a5;font-size:13px;margin-bottom:24px}.tool-box h1{text-align:center;font-size:30px;margin:0 0 8px}.lead{text-align:center;color:#6e7587;font-weight:800;margin:0 0 30px}.tool-section{margin-top:24px}.tool-section h2{font-size:17px;margin:0 0 14px}.tool-section h2 span{display:inline-grid;place-items:center;width:24px;height:24px;margin-right:8px;border-radius:50%;background:#ef5b91;color:#fff;font-size:13px}.tool-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}.tool-label{display:grid;gap:6px;font-size:13px;font-weight:900;align-self:start}.tool-label input,.tool-label select,.custom-row input{width:100%;height:54px;min-height:54px;max-height:54px;border:1px solid #e5e7eb;border-radius:10px;padding:12px;font-size:15px;background:#fff}.custom-block{margin-top:14px;padding:18px;border:1px solid #f2d6e2;border-radius:16px;background:#fffafb}.custom-block h3{margin:0 0 12px;font-size:16px}.custom-items{display:grid;gap:12px}.custom-row{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}.delete-item{height:54px;border:0;border-radius:10px;padding:0 14px;background:#f2f2f6;color:#6e7587;font-weight:900;cursor:pointer}.add-item-btn{width:100%;margin-top:14px;border:1px dashed #ef5b91;background:#fff8fb;color:#ef5b91;border-radius:10px;padding:12px;font-weight:900;cursor:pointer}.check{display:flex;align-items:center;gap:8px;margin-top:20px;font-size:13px;font-weight:900}.submit-btn{width:100%;margin-top:24px;border:0;border-radius:10px;padding:15px;background:linear-gradient(135deg,#4aa3df,#69c6ff);color:#fff;font-weight:900;cursor:pointer}.yearly-btn{background:linear-gradient(135deg,#55b96f,#78d58c)}.result{display:none;margin-top:30px}.result.show{display:block}.result-main{text-align:center;background:linear-gradient(#fff8fb,#fff);border:1px solid #ffd4e5;border-radius:20px;padding:28px}.result-main p{font-weight:900;margin:0 0 8px}.result-main strong{display:block;font-size:46px;color:#ef5b91}.result-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}.result-cards div{border:1px solid #e9e8ef;border-radius:16px;padding:18px;text-align:center;background:#fff}.result-cards span{display:block;color:#6e7587;font-size:13px;font-weight:900}.result-cards b{display:block;color:#ef5b91;font-size:24px;margin-top:6px}.result-summary{margin-top:22px;border:1px solid #e9e8ef;border-radius:18px;padding:22px;background:#fff}.result-summary h2{margin:0 0 12px;font-size:18px}.result-summary ul{list-style:none;padding:0;margin:0}.result-summary li{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #f1f1f5;font-weight:800}.result-summary li:last-child{border-bottom:0}.affiliate-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;margin-top:22px}.affiliate-card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;min-height:160px;padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;color:#202638;box-shadow:0 10px 28px rgba(36,30,68,.06);transition:.2s ease}.affiliate-card span{font-size:42px}.affiliate-name{display:block!important;font-size:20px;font-weight:800;color:#202638;text-align:center;line-height:1.5;margin:0}@media(max-width:700px){.tool-box{padding:24px}.tool-grid,.result-cards,.affiliate-grid{grid-template-columns:1fr}.custom-row{grid-template-columns:1fr}.delete-item{width:100%}.result-main strong{font-size:36px}}</style></head><body><header class="header"><div class="container header-inner"><a class="logo" href="index.html"><span class="heart">♥</span><span><strong>推し活資金AI</strong><small>推しを諦めないためのお金管理AI</small></span></a><nav class="nav"><a href="index.html">ホーム</a><a href="fund.html">診断ツール</a><a href="transport.html">遠征プランナー</a><a href="yearly.html">目標シミュレーター</a><a href="articles.html">お役立ち記事</a></nav><a class="cta" href="fund.html">すべて無料で使えます</a></div></header><main class="page-wrap"><section class="tool-box"><div class="breadcrumb">ホーム ＞ 目標シミュレーター</div><h1>目標シミュレーター</h1><p class="lead">年間で必要な推し活費用を計算します。</p><form id="yearlyForm"><div class="tool-section"><h2><span>1</span>年間目標を入力</h2><div class="tool-grid"><label class="tool-label">ライブ回数/年<input type="number" id="liveCount" value="4"></label><label class="tool-label">チケット代/回<input type="number" id="ticketPrice" value="10000"></label><label class="tool-label">グッズ代/年<input type="number" id="goodsYear" value="80000"></label><label class="tool-label">美容代/年<input type="number" id="beautyYear" value="60000"></label><label class="tool-label">遠征回数/年<input type="number" id="tripCountYear" value="3"></label><label class="tool-label">遠征費/回<input type="number" id="tripPrice" value="35000"></label></div><div class="custom-block"><h3>自由に追加できる目標費用</h3><div id="customItems" class="custom-items"><div class="custom-row"><label class="tool-label">項目名<input type="text" class="custom-name" value="カフェ・コラボ代"></label><label class="tool-label">金額/年<input type="number" class="custom-amount" value="0"></label><button type="button" class="delete-item">削除</button></div></div><button type="button" id="addItem" class="add-item-btn">＋ 目標項目を追加</button></div></div><label class="check"><input type="checkbox" id="agreeData">匿名データとして集計・保存することに同意します</label><button class="submit-btn yearly-btn" type="submit">シミュレーションする →</button></form><div id="yearlyResult" class="result"></div></section></main><footer class="footer"><div class="container footer-grid"><div><h2>♥ 推し活資金AI</h2><p>推し活に夢中な人を応援する、無料のお金管理・診断ツールです。</p></div><div><h3>サービス</h3><p><a href="fund.html">推し活資金診断</a></p><p><a href="saving.html">娯楽費捻出診断</a></p><p><a href="transport.html">遠征プランナー</a></p></div><div><h3>お役立ち情報</h3><p><a href="articles.html">節約術</a></p><p><a href="articles.html">遠征のコツ</a></p></div><div><h3>運営について</h3><p><a href="terms.html">利用規約</a></p><p><a href="privacy.html">プライバシーポリシー</a></p><p><a href="contact.html">お問い合わせ</a></p></div></div></footer><script>function yen(v){return Math.round(Number(v)||0).toLocaleString()+"円"}function n(id){return Number(document.getElementById(id)?.value||0)}function getCustomItems(){const items=[];document.querySelectorAll(".custom-row").forEach(row=>{const name=row.querySelector(".custom-name")?.value.trim()||"追加項目";const amount=Number(row.querySelector(".custom-amount")?.value||0);if(amount>0)items.push({name,amount})});return items}document.getElementById("addItem").addEventListener("click",()=>{const row=document.createElement("div");row.className="custom-row";row.innerHTML='<label class="tool-label">項目名<input type="text" class="custom-name" placeholder="例：グッズ代"></label><label class="tool-label">金額<input type="number" class="custom-amount" value="0"></label><button type="button" class="delete-item">削除</button>';document.getElementById("customItems").appendChild(row)});document.addEventListener("click",e=>{if(e.target.classList.contains("delete-item")){const rows=document.querySelectorAll(".custom-row");if(rows.length<=1){const row=e.target.closest(".custom-row");row.querySelector(".custom-name").value="";row.querySelector(".custom-amount").value=0;return}e.target.closest(".custom-row").remove()}});document.getElementById("yearlyForm").addEventListener("submit",e=>{e.preventDefault();const base=[{name:"チケット代",amount:n("liveCount")*n("ticketPrice")},{name:"グッズ代",amount:n("goodsYear")},{name:"美容代",amount:n("beautyYear")},{name:"遠征費",amount:n("tripCountYear")*n("tripPrice")}];const all=[...base,...getCustomItems()];const total=all.reduce((s,i)=>s+i.amount,0);const breakdown=all.filter(i=>i.amount>0).map(i=>`<li><span>${i.name}</span><b>${yen(i.amount)}</b></li>`).join("");const r=document.getElementById("yearlyResult");r.classList.add("show");r.innerHTML=`<div class="result-main"><p>年間目標予算</p><strong>${yen(total)}</strong></div><div class="result-cards"><div><span>月の積立目安</span><b>${yen(Math.ceil(total/12))}</b></div><div><span>半年で貯めるなら</span><b>${yen(Math.ceil(total/6))}</b></div><div><span>3か月で貯めるなら</span><b>${yen(Math.ceil(total/3))}</b></div></div><div class="result-summary"><h2>目標内訳</h2><ul>${breakdown}<li><span>合計</span><b>${yen(total)}</b></li></ul></div>`});</script></body></html>
