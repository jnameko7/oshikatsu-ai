<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>推し活資金診断｜推し活資金AI</title><link rel="stylesheet" href="style.css"><style>.tool-page{padding:36px 16px 60px;background:linear-gradient(180deg,#fff,#fffafb)}.tool-box{width:min(960px,100%);margin:auto;background:#fff;border:1px solid #e9e8ef;border-radius:22px;box-shadow:0 18px 45px rgba(36,30,68,.10);padding:36px}.tool-box h1{text-align:center;font-size:30px;margin:0 0 8px}.tool-lead{text-align:center;color:#6e7587;font-weight:800;margin:0 0 30px}.breadcrumb{color:#8b93a5;font-size:13px;margin-bottom:24px}.steps{display:flex;justify-content:center;gap:70px;margin-bottom:30px;color:#8b93a5;font-size:13px;font-weight:800}.step{display:grid;place-items:center;gap:6px}.step span,.dot{width:24px;height:24px;border-radius:50%;background:#f2f2f6;display:grid;place-items:center}.step.active span,.step.active .dot{background:#ef5b91;color:#fff}.tool-section{margin-top:24px}.tool-section h2{font-size:17px;margin:0 0 14px}.tool-section h2 span{display:inline-grid;place-items:center;width:24px;height:24px;margin-right:8px;border-radius:50%;background:#ef5b91;color:#fff;font-size:13px}.tool-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}.tool-label{display:grid;gap:6px;font-size:13px;font-weight:900;align-self:start}.tool-label input,.tool-label select,.custom-row input{width:100%;height:54px;min-height:54px;max-height:54px;border:1px solid #e5e7eb;border-radius:10px;padding:12px;font-size:15px;background:#fff}.custom-block{margin-top:14px;padding:18px;border:1px solid #f2d6e2;border-radius:16px;background:#fffafb}.custom-block h3{margin:0 0 12px;font-size:16px}.custom-items{display:grid;gap:12px}.custom-row{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}.delete-item{height:54px;border:0;border-radius:10px;padding:0 14px;background:#f2f2f6;color:#6e7587;font-weight:900;cursor:pointer}.add-item-btn{width:100%;margin-top:14px;border:1px dashed #ef5b91;background:#fff8fb;color:#ef5b91;border-radius:10px;padding:12px;font-weight:900;cursor:pointer}.check{display:flex;align-items:center;gap:8px;margin-top:20px;font-size:13px;font-weight:900}.check input{width:auto}.submit-btn{width:100%;margin-top:24px;border:0;border-radius:10px;padding:15px;background:linear-gradient(135deg,#ef5b91,#ff80ad);color:#fff;font-weight:900;cursor:pointer}.submit-blue{background:linear-gradient(135deg,#4aa3df,#69c6ff)}.submit-green{background:linear-gradient(135deg,#55b96f,#78d58c)}.submit-purple{background:linear-gradient(135deg,#9b6ee8,#b388ff)}.result{display:none;margin-top:30px}.result.show{display:block}.result-main{text-align:center;background:linear-gradient(#fff8fb,#fff);border:1px solid #ffd4e5;border-radius:20px;padding:28px}.result-main p{font-weight:900;margin:0 0 8px}.result-main strong{display:block;font-size:46px;color:#ef5b91}.result-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}.result-cards div{border:1px solid #e9e8ef;border-radius:16px;padding:18px;text-align:center;background:#fff}.result-cards span{display:block;color:#6e7587;font-size:13px;font-weight:900}.result-cards b{display:block;color:#ef5b91;font-size:24px;margin-top:6px}.result-summary{margin-top:22px;border:1px solid #e9e8ef;border-radius:18px;padding:22px;background:#fff}.result-summary h2{margin:0 0 12px;font-size:18px}.result-summary ul{list-style:none;padding:0;margin:0}.result-summary li{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #f1f1f5;font-weight:800}.result-summary li:last-child{border-bottom:0}.affiliate-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;margin-top:22px}.affiliate-card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;min-height:180px;padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;color:#202638;box-shadow:0 10px 28px rgba(36,30,68,.06);transition:.2s ease}.affiliate-card:hover{transform:translateY(-4px);border-color:#ff9cc2}.affiliate-card .icon{font-size:46px;line-height:1}.affiliate-name{display:block!important;font-size:20px;font-weight:800;color:#202638;text-align:center;line-height:1.5;margin:0}@media(max-width:760px){.tool-box{padding:24px}.tool-grid,.result-cards,.affiliate-grid{grid-template-columns:1fr}.custom-row{grid-template-columns:1fr}.delete-item{width:100%}.steps{gap:24px}.result-main strong{font-size:36px}}</style></head><body><header class="header"><div class="container header-inner"><a class="logo" href="index.html"><span class="heart">♥</span><span><strong>推し活資金AI</strong><small>推しを諦めないためのお金管理AI</small></span></a><nav class="nav"><a href="index.html">ホーム</a><a href="fund.html">診断ツール</a><a href="transport.html">遠征プランナー</a><a href="yearly.html">目標シミュレーター</a><a href="kakeibo.html">推し活家計簿</a><a href="articles.html">お役立ち記事</a></nav><a class="cta" href="fund.html">すべて無料で使えます</a></div></header><main class="tool-page"><section class="tool-box"><div class="breadcrumb">ホーム ＞ 推し活資金診断</div><h1>推し活資金診断</h1><p class="tool-lead">収入と支出から、毎月いくら推し活に使えるか診断します。</p><form id="fundForm"><div class="tool-section"><h2><span>1</span>収入</h2><label class="tool-label">手取り月収<input type="number" id="income" value="300000"></label></div><div class="tool-section"><h2><span>2</span>毎月の支出</h2><div class="tool-grid"><label class="tool-label">家賃<input type="number" id="rent" value="80000"></label><label class="tool-label">食費<input type="number" id="food" value="40000"></label><label class="tool-label">通信費<input type="number" id="mobile" value="10000"></label><label class="tool-label">光熱費<input type="number" id="utility" value="10000"></label><label class="tool-label">サブスク<input type="number" id="subs" value="5000"></label><label class="tool-label">交通費<input type="number" id="transport" value="10000"></label><label class="tool-label">日用品・雑費<input type="number" id="daily" value="10000"></label><label class="tool-label">毎月の貯金・積立<input type="number" id="save" value="20000"></label></div><div class="custom-block"><h3>自由に追加できる支出</h3><div id="customItems" class="custom-items"><div class="custom-row"><label class="tool-label">項目名<input type="text" class="custom-name" value="その他の支出"></label><label class="tool-label">金額<input type="number" class="custom-amount" value="20000"></label><button type="button" class="delete-item">削除</button></div></div><button type="button" id="addItem" class="add-item-btn">＋ 支出項目を追加</button></div></div><label class="check"><input type="checkbox" id="agreeData">匿名データとして集計・保存することに同意します</label><button class="submit-btn" type="submit">診断する →</button></form><div id="fundResult" class="result"></div></section></main><div id="oshiHistoryMount"></div><footer class="footer"><div class="container footer-grid"><div><h2>♥ 推し活資金AI</h2><p>推し活に夢中な人を応援する、無料のお金管理・診断ツールです。</p></div><div><h3>サービス</h3><p><a href="fund.html">推し活資金診断</a></p><p><a href="saving.html">娯楽費捻出診断</a></p><p><a href="transport.html">遠征プランナー</a></p><p><a href="kakeibo.html">推し活家計簿</a></p></div><div><h3>お役立ち情報</h3><p><a href="articles.html">節約術</a></p><p><a href="articles.html">遠征のコツ</a></p></div><div><h3>運営について</h3><p><a href="terms.html">利用規約</a></p><p><a href="privacy.html">プライバシーポリシー</a></p><p><a href="contact.html">お問い合わせ</a></p></div></div></footer><link rel="stylesheet" href="history.css"><script src="history.js"></script><script>const yen=v=>Math.round(Number(v)||0).toLocaleString()+"円";const n=id=>Number(document.getElementById(id)?.value||0);function custom(){const a=[];document.querySelectorAll(".custom-row").forEach(r=>{const name=r.querySelector(".custom-name")?.value||"追加項目";const amount=Number(r.querySelector(".custom-amount")?.value||0);if(amount>0)a.push({name,amount})});return a}document.addEventListener("click",e=>{if(e.target.classList.contains("delete-item")){const rows=document.querySelectorAll(".custom-row");if(rows.length<=1){const r=e.target.closest(".custom-row");r.querySelector(".custom-name").value="";r.querySelector(".custom-amount").value=0}else e.target.closest(".custom-row").remove()}});</script><script>document.getElementById("addItem").onclick=()=>{const r=document.createElement("div");r.className="custom-row";r.innerHTML='<label class="tool-label">項目名<input type="text" class="custom-name" placeholder="例：美容院代"></label><label class="tool-label">金額<input type="number" class="custom-amount" value="0"></label><button type="button" class="delete-item">削除</button>';customItems.appendChild(r)};fundForm.onsubmit=e=>{e.preventDefault();const income=n("income");const base=[["家賃",n("rent")],["食費",n("food")],["通信費",n("mobile")],["光熱費",n("utility")],["サブスク",n("subs")],["交通費",n("transport")],["日用品・雑費",n("daily")],["毎月の貯金・積立",n("save")]].map(x=>({name:x[0],amount:x[1]}));const all=[...base,...custom()];const fixed=all.reduce((s,i)=>s+i.amount,0);const monthly=Math.max(income-fixed,0);const yearly=monthly*12;const lis=all.filter(i=>i.amount>0).map(i=>`<li><span>${i.name}</span><b>${yen(i.amount)}</b></li>`).join("");fundResult.classList.add("show");fundResult.innerHTML=`<div class="result-main"><p>毎月推し活に使える金額</p><strong>${yen(monthly)}</strong></div><div class="result-cards"><div><span>年間推し活予算</span><b>${yen(yearly)}</b></div><div><span>グッズ予算目安</span><b>${yen(yearly*.3)}</b></div><div><span>遠征可能回数</span><b>${Math.floor(yearly/40000)}〜${Math.floor(yearly/40000)+1}回</b></div></div><div class="result-summary"><h2>支出内訳</h2><ul><li><span>収入</span><b>${yen(income)}</b></li>${lis}<li><span>支出・貯金合計</span><b>${yen(fixed)}</b></li></ul></div>`}</script></body></html>
