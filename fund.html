<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>推し活資金診断｜推し活資金AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<header class="header">
  <div class="container header-inner">
    <a class="logo" href="index.html">
      <span class="heart">♥</span>
      <span><strong>推し活資金AI</strong><small>推しを諦めないためのお金管理AI</small></span>
    </a>
    <nav class="nav">
      <a href="index.html">ホーム</a>
      <a class="active" href="fund.html">診断ツール</a>
      <a href="transport.html">遠征プランナー</a>
      <a href="yearly.html">目標シミュレーター</a>
      <a href="articles.html">お役立ち記事</a>
    </nav>
    <a class="cta" href="fund.html">すべて無料で使えます</a>
  </div>
</header>

<main class="fund-page">
  <section class="fund-card">
    <div class="breadcrumb">ホーム ＞ 推し活資金診断</div>

    <h1>推し活資金診断</h1>
    <p class="lead">あなたの収入と支出から、毎月いくら推し活に使えるか診断します。</p>

    <div class="steps">
      <div class="step active"><span>1</span>入力</div>
      <div class="step"><span>2</span>確認</div>
      <div class="step"><span>3</span>結果</div>
    </div>

    <form id="fundForm" class="fund-form">
      <h2><span>1</span>収入を入力してください</h2>
      <label>手取り月収
        <input type="number" id="income" value="300000">
      </label>

      <h2><span>2</span>毎月の支出を入力してください</h2>
      <div class="fund-grid">
        <label>家賃（住宅ローン）<input type="number" id="rent" value="80000"></label>
        <label>食費<input type="number" id="food" value="40000"></label>
        <label>通信費<input type="number" id="mobile" value="10000"></label>
        <label>光熱費<input type="number" id="utility" value="10000"></label>
        <label>サブスク・定期サービス<input type="number" id="subs" value="5000"></label>
        <label>交通費<input type="number" id="transport" value="10000"></label>
        <label>日用品・雑費<input type="number" id="daily" value="10000"></label>
        <label>その他の支出<input type="number" id="other" value="20000"></label>
        <label>毎月の貯金・積立<input type="number" id="save" value="20000"></label>
      </div>

      <label class="check">
        <input type="checkbox" id="agreeData">
        匿名データとして集計・保存することに同意します
      </label>

      <button class="fund-submit" type="submit">診断する →</button>
    </form>

    <div id="fundResult" class="fund-result"></div>
  </section>
</main>

<script src="common.js"></script>
<script>
document.getElementById("fundForm").addEventListener("submit", function(e){
  e.preventDefault();

  const n = id => Number(document.getElementById(id).value || 0);
  const yen = v => Math.round(v).toLocaleString() + "円";

  const income = n("income");
  const fixed =
    n("rent") + n("food") + n("mobile") + n("utility") +
    n("subs") + n("transport") + n("daily") + n("other") + n("save");

  const monthly = Math.max(income - fixed, 0);
  const yearly = monthly * 12;
  const goods = Math.floor(yearly * 0.3);
  const trips = Math.max(Math.floor(yearly / 40000), 0);

  document.getElementById("fundResult").innerHTML = `
    <div class="result-hero">
      <p>あなたが毎月推し活に使える金額</p>
      <strong>${yen(monthly)}</strong>
    </div>

    <div class="result-boxes">
      <div><span>年間推し活予算</span><b>${yen(yearly)}</b></div>
      <div><span>グッズ予算目安（年間）</span><b>${yen(goods)}</b></div>
      <div><span>遠征可能回数（年間）</span><b>${trips}〜${trips + 1}回</b></div>
    </div>

    <div class="result-summary">
      <h2>収支の内訳</h2>
      <ul>
        <li><span>収入</span><b>${yen(income)}</b></li>
        <li><span>固定費合計</span><b>${yen(fixed)}</b></li>
        <li><span>推し活に使える金額</span><b>${yen(monthly)}</b></li>
      </ul>
    </div>

    <div class="result-note">家計のバランスは良好です！無理のない範囲で推し活を楽しみましょう。</div>
  `;
});
</script>
</body>
</html>
