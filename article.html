<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>記事詳細｜推し活資金AI</title>
  <meta name="description" content="推し活に役立つ記事を紹介します。" />
  <link rel="stylesheet" href="/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6088406710027099" crossorigin="anonymous"></script>
  <style>
    :root{--oa-pink:#ff6fae;--oa-pink-dark:#e84691;--oa-soft:#fff3f8;--oa-border:#ffd1e5;--oa-text:#312633;--oa-muted:#777}
    .oa-article-page{width:min(920px,calc(100% - 32px));margin:0 auto;padding:34px 0 80px;color:var(--oa-text)}
    .oa-article-card{overflow:hidden;border:1px solid var(--oa-border);border-radius:24px;background:rgba(255,255,255,.96);box-shadow:0 16px 40px rgba(255,111,174,.13)}
    .oa-eyecatch-wrap{background:#fff;border-bottom:1px solid #ffe1ee}.oa-eyecatch{display:block;width:100%;aspect-ratio:16/9;object-fit:cover}
    .oa-article-inner{padding:clamp(22px,4vw,42px)}.oa-category{display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;padding:6px 12px;border-radius:999px;color:var(--oa-pink-dark);background:var(--oa-soft);border:1px solid var(--oa-border);font-size:13px;font-weight:700}
    .oa-title{margin:0 0 14px;color:#2f2430;font-size:clamp(24px,4vw,36px);line-height:1.35;letter-spacing:.02em}.oa-meta{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:28px;color:var(--oa-muted);font-size:13px}
    .oa-lead,.oa-intro-body{margin:0 0 30px;color:#5b4450;line-height:2;font-weight:500}.oa-intro-body p{margin:0 0 1.45em}.oa-intro-body strong{color:#c92f78;background:linear-gradient(transparent 62%,#ffe0ef 62%);font-weight:800}
    .oa-body{font-size:16px;line-height:2;word-break:break-word}.oa-body h2{position:relative;margin:46px 0 18px;padding:16px 18px 16px 20px;border-left:7px solid var(--oa-pink);border-radius:14px;background:linear-gradient(90deg,#fff0f7,#fff);color:#332733;font-size:clamp(22px,3vw,28px);line-height:1.45}.oa-body h3{margin:34px 0 14px;padding-bottom:10px;border-bottom:2px dashed #ff9ac7;color:var(--oa-pink-dark);font-size:clamp(19px,2.4vw,23px);line-height:1.5}.oa-body p{margin:0 0 1.45em}.oa-body strong{color:#c92f78;background:linear-gradient(transparent 62%,#ffe0ef 62%);font-weight:800}.oa-body a{color:#d63384;font-weight:700;text-underline-offset:4px}.oa-body ul,.oa-body ol{margin:24px 0;padding:18px 24px 18px 36px;border:1px solid var(--oa-border);border-radius:18px;background:#fff8fb}.oa-body li{margin:8px 0}.oa-body blockquote{margin:28px 0;padding:18px 22px;border-left:5px solid #ff9ac7;border-radius:14px;background:#fff7fb;color:#5a4650}.oa-body table{width:100%;border-collapse:collapse;margin:28px 0;border-radius:14px;box-shadow:0 0 0 1px var(--oa-border);overflow:hidden}.oa-body th,.oa-body td{padding:12px 14px;border:1px solid #ffe1ee;text-align:left;vertical-align:top}.oa-body th{background:#fff0f7;color:#c92f78}
    .oa-toc{margin:0 0 30px;padding:20px 22px;border:1px solid var(--oa-border);border-radius:20px;background:linear-gradient(135deg,#fff7fb,#fff);box-shadow:0 10px 26px rgba(255,111,174,.10)}.oa-toc-title{display:flex;align-items:center;gap:8px;margin:0 0 14px;color:var(--oa-pink-dark);font-size:18px;font-weight:900}.oa-toc-list{display:grid;gap:10px;margin:0;padding:0;list-style:none;counter-reset:toc}.oa-toc-list li{counter-increment:toc;margin:0}.oa-toc-list a{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid #ffe1ee;border-radius:14px;background:#fff;color:#3f3038;text-decoration:none;font-weight:700;line-height:1.5;transition:.18s}.oa-toc-list a::before{content:counter(toc);display:inline-grid;place-items:center;flex:0 0 26px;width:26px;height:26px;border-radius:999px;background:linear-gradient(135deg,#ff78b6,#ffb7d5);color:#fff;font-size:13px;font-weight:900}.oa-toc-list a:hover{transform:translateY(-1px);border-color:#ff9ac7;color:var(--oa-pink-dark);box-shadow:0 8px 18px rgba(255,111,174,.13)}html{scroll-behavior:smooth}.oa-body h2,.oa-body h3{scroll-margin-top:100px}
    .oa-auto-affiliate{margin:38px 0;text-align:center;padding:0!important;border:0!important;background:transparent!important;box-shadow:none!important;border-radius:0!important}.oa-auto-affiliate iframe,.oa-auto-affiliate img{max-width:100%;height:auto}
    .oa-bottom-space{height:70px}.oa-image-error{display:grid;place-items:center;min-height:220px;padding:24px;color:#d63384;background:#fff7fb;font-weight:700;text-align:center}.oa-error,.oa-loading{padding:30px;border:1px solid var(--oa-border);border-radius:20px;background:#fff;text-align:center;color:#6b5360}
    @media(max-width:640px){.oa-article-page{width:min(100% - 20px,920px);padding-bottom:70px}.oa-article-inner{padding:20px}.oa-body{font-size:15px;line-height:1.9}.oa-body ul,.oa-body ol{padding-left:30px}}
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="/index.html"><span class="heart">♥</span><span><strong>推し活資金AI</strong><small>推しを諦めないためのお金管理AI</small></span></a>
      <nav class="nav">
        <a href="/index.html">ホーム</a>
        <a href="/fund.html">診断ツール</a>
        <a href="/transport.html">遠征プランナー</a>
        <a href="/yearly.html">目標シミュレーター</a>
        <a href="/kakeibo.html">推し活家計簿</a>
        <a class="active" href="/articles.html">お役立ち記事</a>
      </nav>
      <a class="cta" href="/fund.html">すべて無料で使えます</a>
    </div>
  </header>

  <main class="oa-article-page">
    <article id="articleRoot" class="oa-article-card"><div class="oa-loading">記事を読み込み中...</div></article>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div><h2>♥ 推し活資金AI</h2><p>推し活に夢中な人を応援する、無料のお金管理・診断ツールです。</p></div>
      <div><h3>サービス</h3><p><a href="/fund.html">推し活資金診断</a></p><p><a href="/saving.html">娯楽費捻出診断</a></p><p><a href="/transport.html">遠征プランナー</a></p><p><a href="/kakeibo.html">推し活家計簿</a></p></div>
      <div><h3>お役立ち情報</h3><p><a href="/articles.html">節約術</a></p><p><a href="/articles.html">遠征のコツ</a></p></div>
      <div><h3>運営について</h3><p><a href="/terms.html">利用規約</a></p><p><a href="/privacy.html">プライバシーポリシー</a></p><p><a href="/contact.html">お問い合わせ</a></p></div>
    </div>
  </footer>

<script>
const root=document.getElementById('articleRoot');
const params=new URLSearchParams(location.search);
const articleId=getRequestedArticleKey();
initArticlePage();

async function initArticlePage(){
  try{
    const article=await findArticle(articleId);
    if(!article||!hasArticleContent(article)){showError('記事が見つかりませんでした。管理画面で記事ID・URLスラッグを確認してください。');return}
    renderArticle(article);
  }catch(e){console.error(e);showError('記事の読み込みに失敗しました。')}
}

async function findArticle(id){
  const local=findArticleFromLocalStorage(id);if(local)return local;
  const q=encodeURIComponent(id||'');
  const apiUrls=[
    '/api/articles/'+q,
    '/api/article?id='+q,
    '/api/articles?id='+q,
    '/api/article?slug='+q,
    '/api/articles?slug='+q,
    '/api/post?slug='+q,
    '/api/posts?slug='+q,
    '/api/articles','/api/article','/api/posts','/api/blog','/articles.json','/data/articles.json'
  ];
  for(const url of apiUrls){try{const res=await fetch(url,{cache:'no-store'});if(!res.ok)continue;const data=await res.json();const found=extractArticle(data,id);if(found)return found}catch(_){}}
  return null;
}
function findArticleFromLocalStorage(id){const preferred=['oshikatsu_articles','oshikatsuArticles','oshikatsu_ai_articles','articles','blogArticles','blog_articles','posts','oshikatsu_posts','savedArticles','articleList'];for(const key of preferred){const found=readStorageKey(key,id);if(found)return found}for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(preferred.includes(key))continue;const found=readStorageKey(key,id);if(found)return found}return null}
function readStorageKey(key,id){try{const raw=localStorage.getItem(key);if(!raw||raw.length<2)return null;return extractArticle(JSON.parse(raw),id)}catch(_){return null}}
function extractArticle(data,id){if(!data)return null;if(Array.isArray(data)){if(id){const hit=data.find(x=>sameId(x,id));if(hit)return hit}return data.find(hasArticleContent)||null}if(typeof data==='object'){if(sameId(data,id)&&hasArticleContent(data))return data;for(const k of ['article','data','post','item','currentArticle','content']){const hit=extractArticle(data[k],id);if(hit)return hit}for(const k of ['contents','articles','posts','items','list','records']){const hit=extractArticle(data[k],id);if(hit)return hit}if(!id&&hasArticleContent(data))return data}return null}

function getRequestedArticleKey(){
  const direct=params.get('slug')||params.get('urlSlug')||params.get('url_slug')||params.get('permalink')||params.get('id')||'';
  if(direct)return direct;
  const parts=location.pathname.split('/').filter(Boolean);
  const last=decodeURIComponent(parts[parts.length-1]||'');
  if(last&&last!=='article.html'&&last!=='article')return last.replace(/\.html?$/i,'');
  return '';
}
function normalizeSlug(v){return decodeURIComponent(String(v||'')).trim().replace(/^https?:\/\/[^/]+/,'').replace(/^\/?article\.html\/?/i,'').replace(/^\?slug=/i,'').replace(/^\?id=/i,'').replace(/^\/+|\/+$/g,'').replace(/\.html?$/i,'').toLowerCase()}
function sameId(a,id){if(!a||!id||typeof a!=='object')return false;const target=normalizeSlug(id);const values=[a.id,a.articleId,a.article_id,a.slug,a.urlSlug,a.url_slug,a.permalink,a.path,a.url,a.uid,a.key];return values.some(v=>v!==undefined&&v!==null&&(String(v)===String(id)||normalizeSlug(v)===target))}
function hasArticleContent(a){if(!a||typeof a!=='object')return false;return Boolean(pick(a,['title','name'])&&(pick(a,['body','content','articleBody','mainText','text','html','contentHtml','articleHtml','bodyHtml','rawBody','markdown','value'])||pick(a,['lead','intro','excerpt','summary','description'])))}

function renderArticle(article){
  const title=pick(article,['title','name'])||'記事タイトル';
  const seo=pick(article,['seoDescription','seo_description','metaDescription','meta_description','description'])||'';
  const lead=pick(article,['lead','intro','excerpt','summary'])||'';
  const body=pick(article,['body','content','articleBody','mainText','text','html','contentHtml','articleHtml','bodyHtml','rawBody','markdown','value'])||'';
  const image=getArticleImage(article);
  const category=pick(article,['category','genre'])||'推し活コラム';
  const date=pick(article,['date','createdAt','updatedAt','publishedAt','publishedAt'])||'';
  const affiliate=pick(article,['affiliateHtml','affiliateHTML','affiliate_html','adHtml','adHTML','adCode','rakutenHtml','htmlAd','affiliate','adsHtml'])||'';
  document.title=title+'｜推し活資金AI';
  setMetaDescription(seo||lead||title);
  reflectSlugInUrl(article);

  const cleaned=removeSeoDescriptionFromBody(body,seo);
  const formatted=cleaned;
  const split=splitIntroAndBody(formatted);
  const leadHtml=(lead&&normalizeText(lead)!==normalizeText(seo)&&normalizeText(lead)!==normalizeText(split.intro))?`<div class="oa-lead">${escapeHtml(lead)}</div>`:'';

  root.innerHTML=`${image?`<div class="oa-eyecatch-wrap"><img id="oaEyecatch" class="oa-eyecatch" alt="${escapeAttr(title)}"></div>`:''}<div class="oa-article-inner"><div class="oa-category">♡ ${escapeHtml(category)}</div><h1 class="oa-title">${escapeHtml(title)}</h1><div class="oa-meta">${date?`<span>投稿日：${escapeHtml(formatDate(date))}</span>`:''}</div>${leadHtml}${split.intro?`<div class="oa-intro-body">${split.intro}</div>`:''}<div id="oaToc"></div><div class="oa-body">${split.body||'<p>本文がありません。</p>'}</div><div class="oa-bottom-space"></div></div>`;
  if(image)mountEyecatch(image,title);
  createToc();
  if(affiliate)insertAffiliateBlocks(affiliate);
}

function splitIntroAndBody(html){
  const wrap=document.createElement("div");
  wrap.innerHTML=String(html||"");

  const firstH2=wrap.querySelector("h2");

  if(!firstH2){
    return {
      intro:"",
      body:wrap.innerHTML
    };
  }

  const introHtml=[];
  let node=wrap.firstElementChild;

  while(node && node!==firstH2){
    introHtml.push(node.outerHTML);
    const next=node.nextElementSibling;
    node.remove();
    node=next;
  }

  return {
    intro:introHtml.join(""),
    body:wrap.innerHTML
  };
}

function reflectSlugInUrl(article){
  const slug=pick(article,['slug','urlSlug','url_slug','permalink']);
  if(!slug||!history.replaceState)return;
  const clean=normalizeSlug(slug);
  if(!clean)return;
  const desired='/article.html/'+encodeURIComponent(clean);
  if(location.pathname!==desired)history.replaceState(null,'',desired+location.hash);
}
function getArticleImage(article){let v=pick(article,['image','eyecatch','eyecatchUrl','eyeCatchUrl','thumbnail','thumbnailUrl','imageUrl','coverImage','mainImage','main_image','featuredImage','featured_image','img','photo','heroImage','hero_image','imageData','imageBase64','base64Image','ogImage','og_image']);if(v&&typeof v==='object')v=v.url||v.src||v.href||v.dataUrl||v.dataURL||v.base64||'';v=String(v||'').trim();if(v&&!/^data:image\//i.test(v)&&/^[A-Za-z0-9+/=]+$/.test(v)&&v.length>500)v='data:image/png;base64,'+v;return v}
function imageCandidates(src){const s=String(src||'').trim();if(!s)return[];if(/^data:image\//i.test(s)||/^https?:\/\//i.test(s)||/^blob:/i.test(s)||s.startsWith('/'))return[s];const clean=s.replace(/^\.\//,'').replace(/^public\//,'');return[...new Set([clean,'/'+clean,'./'+clean,'images/'+clean,'/images/'+clean,'img/'+clean,'/img/'+clean,'assets/'+clean,'/assets/'+clean,'uploads/'+clean,'/uploads/'+clean,'generated/'+clean,'/generated/'+clean,'static/'+clean,'/static/'+clean])]}
function mountEyecatch(src,title){const img=document.getElementById('oaEyecatch');if(!img)return;const list=imageCandidates(src);let i=0;img.onerror=()=>{i++;if(i<list.length){img.src=list[i]}else{const wrap=img.closest('.oa-eyecatch-wrap');if(wrap)wrap.innerHTML='<div class="oa-image-error">画像ファイルが見つかりません。画像をサイト内にアップロードし直してください。</div>'}};img.alt=title;img.src=list[0]}
function createToc(){const toc=document.getElementById('oaToc');const body=document.querySelector('.oa-body');if(!toc||!body)return;const headings=body.querySelectorAll('h2');if(headings.length===0){toc.style.display='none';return}let html='<nav class="oa-toc" aria-label="記事の目次"><div class="oa-toc-title">📖 目次</div><ol class="oa-toc-list">';headings.forEach((heading,index)=>{const id='toc-'+index;heading.id=id;html+=`<li><a href="#${id}">${escapeHtml(heading.textContent)}</a></li>`});html+='</ol></nav>';toc.innerHTML=html}
function insertAffiliateBlocks(html){
  const body=document.querySelector('.oa-body');if(!body||!String(html||'').trim())return;
  const h2s=Array.from(body.querySelectorAll('h2'));if(h2s.length===0)return;
  const targets=[{type:'before',el:h2s[0]}];
  if(h2s.length>=3){const middleH2=h2s[Math.floor(h2s.length/2)];if(middleH2&&middleH2!==h2s[0])targets.push({type:'before',el:middleH2})}
  const summaryH2=h2s.find(h=>/まとめ|総まとめ|結論|最後に/i.test((h.textContent||'').trim()));
  if(summaryH2){let last=summaryH2;let next=summaryH2.nextElementSibling;while(next&&next.tagName!=='H2'){if(!next.classList.contains('oa-auto-affiliate'))last=next;next=next.nextElementSibling}targets.push({type:'after',el:last})}else{const kids=Array.from(body.children).filter(el=>!el.classList.contains('oa-auto-affiliate'));if(kids[kids.length-1])targets.push({type:'after',el:kids[kids.length-1]})}
  const used=new Set();let count=0;targets.forEach(t=>{if(!t.el)return;const key=t.type+'-'+Array.from(body.children).indexOf(t.el);if(used.has(key))return;used.add(key);count++;const box=document.createElement('div');box.className='oa-auto-affiliate';box.innerHTML=`<div id="oaAffiliateAuto${count}"></div>`;t.el.insertAdjacentElement(t.type==='before'?'beforebegin':'afterend',box);renderAffiliateHtml('oaAffiliateAuto'+count,html)})
}
function formatArticleBody(input){const raw=String(input||'').trim();if(!raw)return'';if(/<\/?(h2|h3|p|ul|ol|li|table|blockquote|div|br|strong|a|img)\b/i.test(raw))return raw.replace(/<script[\s\S]*?<\/script>/gi,'');const escaped=escapeHtml(raw);return escaped.replace(/^###\s+(.+)$/gm,'<h3>$1</h3>').replace(/^##\s+(.+)$/gm,'<h2>$1</h2>').replace(/^#\s+(.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').split(/\n{2,}/).map(block=>{const t=block.trim();if(!t)return'';if(/^<h[23]>/.test(t))return t;if(/^[-・]\s+/m.test(t)){const items=t.split('\n').filter(Boolean).map(l=>l.replace(/^[-・]\s+/,'').trim());return'<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>'}return'<p>'+t.replace(/\n/g,'<br>')+'</p>'}).join('')}
function renderAffiliateHtml(id,html){const mount=document.getElementById(id);if(!mount)return;mount.innerHTML=String(html);mount.querySelectorAll('script').forEach(old=>{const s=document.createElement('script');Array.from(old.attributes).forEach(a=>s.setAttribute(a.name,a.value));s.textContent=old.textContent;old.replaceWith(s)})}
function pick(obj,keys){for(const k of keys){const v=obj&&obj[k];if(v!==undefined&&v!==null&&String(v).trim()!=='')return v}return''}
function setMetaDescription(text){let m=document.querySelector('meta[name="description"]');if(!m){m=document.createElement('meta');m.name='description';document.head.appendChild(m)}m.content=String(text).replace(/<[^>]*>/g,'').slice(0,160)}
function removeSeoDescriptionFromBody(body,seo){let text=String(body||'').trim();const desc=String(seo||'').trim();if(desc&&normalizeText(text).startsWith(normalizeText(desc)))text=text.slice(desc.length).trim();return text.replace(/^SEO説明文[:：].*(\n|$)/,'').replace(/^メタディスクリプション[:：].*(\n|$)/,'').trim()}
function normalizeText(v){return String(v||'').replace(/<[^>]*>/g,'').replace(/\s+/g,'')}
function formatDate(v){const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})}
function showError(msg){root.innerHTML='<div class="oa-error">'+escapeHtml(msg)+'</div>'}
function escapeHtml(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function escapeAttr(v){return escapeHtml(v).replace(/`/g,'&#096;')}
</script>
</body>
</html>
