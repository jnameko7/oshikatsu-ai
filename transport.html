<a class="header-cta" href="fund.html">無料で診断</a></div></header><main><div class="container breadcrumb">TOP ＞ 遠征交通検索</div><section class="section"><div class="container wide-card"><div class="section-title"><span></span><h2>遠征交通検索</h2></div><p>NAVITIME風に駅・日時・交通手段を細かく選べます。現段階では概算＋外部検索リンクです。</p><form id="transportForm" class="form"><label>出発駅<input type="text" id="fromStation" value="名古屋"></label><label>到着駅<input type="text" id="toStation" value="東京"></label><label>日付<input type="date" id="travelDate"></label><label>出発/到着<select id="timeMode"><option value="depart">出発</option><option value="arrive">到着</option></select></label><label>時刻<input type="time" id="travelTime" value="09:00"></label><label>交通手段<select id="transportType"><option value="all">おすすめ</option><option value="shinkansen">新幹線</option><option value="plane">飛行機</option><option value="bus">夜行バス</option><option value="local">在来線</option></select></label><label>並び替え<select id="sortType"><option value="cheap">安い順</option><option value="fast">早い順</option><option value="easy">乗換少なめ</option></select></label><label>宿泊数<input type="number" id="nights" value="1"></label><label>1日食費<input type="number" id="mealBudget" value="3000"></label><button class="btn blue" type="submit">検索する</button></form><div class="answer" id="transportResult"></div><table class="simple-table" id="routeTable" style="display:none"><thead><tr><th>手段</th><th>交通費目安</th><th>所要時間目安</th><th>宿泊込み</th></tr></thead><tbody id="routeRows"></tbody></table><div class="share-box" id="shareBox" style="display:none"><textarea id="shareText" rows="4"></textarea><div class="share-buttons"><button class="btn dark" id="shareX">X</button><button class="btn green" id="shareLine">LINE</button><button class="btn purple" id="copyText">コピー</button></div></div></div></section><section class="section soft"><div class="container"><div class="section-title"><span></span><h2>比較サイトへ進む</h2></div><div class="affiliate-grid"><a class="affiliate-card" id="navitimeLink" href="https://www.navitime.co.jp/transfer/" target="_blank" rel="nofollow noopener"><span>🚃</span><strong>NAVITIME</strong><small>時刻表・乗換・運賃</small></a><a class="affiliate-card" id="rakutenLink" href="https://travel.rakuten.co.jp/" target="_blank" rel="nofollow sponsored noopener"><span>🏨</span><strong>楽天トラベル</strong><small>宿を探す</small></a><a class="affiliate-card" id="jalanLink" href="https://www.jalan.net/" target="_blank" rel="nofollow sponsored noopener"><span>🛏️</span><strong>じゃらん</strong><small>宿を探す</small></a><a class="affiliate-card" id="busLink" href="https://www.bushikaku.net/" target="_blank" rel="nofollow sponsored noopener"><span>🚌</span><strong>高速バス</strong><small>バスを探す</small></a></div></div></section></main><footer class="footer"><div class="container footer-inner"><p>© 推し活資金AI</p><p><a href="terms.html">利用規約</a> / <a href="privacy.html">プライバシーポリシー</a></p></div></footer><script src="js/common.js"></script><script src="js/transport.js"></script></body></html>
